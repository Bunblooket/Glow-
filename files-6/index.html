<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glow Up">
<meta name="theme-color" content="#0a0908">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Glow Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold3: #f5e0a0;
  --dark: #0a0908;
  --dark2: #141210;
  --dark3: #1e1b17;
  --dark4: #28241e;
  --muted: #7a6e5f;
  --text: #f0ebe0;
  --red: #c0392b;
  --green: #27ae60;
  --blue: #2980b9;
  --safe: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--dark);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  overscroll-behavior: none;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: -webkit-fill-available;
}

#screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(80px + var(--safe));
}

/* ── NAV ── */
#nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--dark2);
  border-top: 1px solid #2a2520;
  display: flex;
  padding-bottom: var(--safe);
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 0;
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: color 0.2s;
}

.nav-btn.active { color: var(--gold); }
.nav-icon { font-size: 20px; line-height: 1; }

/* ── PAGES ── */
.page { display: none; animation: fadeUp 0.3s ease; }
.page.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── TYPOGRAPHY ── */
.serif { font-family: 'Cormorant Garamond', serif; }

h1.hero {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px;
  font-weight: 700;
  line-height: 0.9;
  letter-spacing: -0.02em;
}

h1.hero em { font-style: italic; color: var(--gold); }

.eyebrow {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* ── CARDS ── */
.card {
  background: var(--dark3);
  border: 1px solid #2a2520;
  border-radius: 6px;
  padding: 18px;
  margin-bottom: 12px;
}

.card-label {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
  font-weight: 500;
}

/* ── TODAY PAGE ── */
#page-today { padding: 0; }

.today-header {
  padding: 52px 20px 20px;
  background: linear-gradient(180deg, #141210 0%, transparent 100%);
  position: relative;
}

.today-date {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}

.today-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  font-weight: 700;
  line-height: 1;
}

.today-title span { color: var(--gold); font-style: italic; }

.days-left {
  margin-top: 10px;
  font-size: 11px;
  color: var(--muted);
}

.days-left strong { color: var(--gold2); }

/* Progress ring */
.progress-ring-wrap {
  position: absolute;
  right: 20px;
  top: 44px;
}

.progress-ring { transform: rotate(-90deg); }

.ring-bg { fill: none; stroke: #2a2520; stroke-width: 3; }
.ring-fill { fill: none; stroke: var(--gold); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }

.ring-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.ring-pct {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.ring-sub { font-size: 8px; color: var(--muted); letter-spacing: 0.1em; }

/* Timeline */
.timeline { padding: 0 20px 20px; }

.tl-group { margin-bottom: 20px; }

.tl-group-label {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-left: 28px;
}

.tl-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid #1e1b17;
  cursor: pointer;
  position: relative;
}

.tl-item:last-child { border-bottom: none; }

.tl-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--dark4);
  border: 1px solid var(--muted);
  flex-shrink: 0;
  margin-top: 4px;
  transition: all 0.2s;
}

.tl-item.done .tl-dot {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 6px rgba(201,168,76,0.4);
}

.tl-item.exam .tl-dot { background: #c0392b; border-color: #c0392b; }
.tl-item.skip { opacity: 0.4; }

.tl-time {
  font-size: 10px;
  color: var(--muted);
  min-width: 38px;
  margin-top: 2px;
}

.tl-content { flex: 1; }
.tl-name { font-size: 13px; line-height: 1.3; }
.tl-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

.tl-check {
  width: 22px; height: 22px;
  border: 1px solid #3a3028;
  border-radius: 4px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  transition: all 0.2s;
}

.tl-item.done .tl-check {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--dark);
}

/* Exam banner */
.exam-banner {
  background: linear-gradient(135deg, #1a0a0a, #2a1010);
  border: 1px solid #c0392b40;
  border-radius: 6px;
  padding: 12px 16px;
  margin: 0 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.exam-banner-icon { font-size: 24px; }
.exam-banner-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: #e05050; }
.exam-banner-sub { font-size: 10px; color: var(--muted); }

/* ── CALENDAR PAGE ── */
#page-calendar { padding: 52px 20px 20px; }

.cal-header { margin-bottom: 20px; }

.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.month-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 700;
}

.month-btn {
  background: var(--dark3);
  border: 1px solid #2a2520;
  border-radius: 4px;
  color: var(--text);
  width: 32px; height: 32px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}

.cal-days-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 8px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-day {
  aspect-ratio: 1;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
  position: relative;
  background: var(--dark3);
  border: 1px solid transparent;
  transition: all 0.15s;
}

.cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-day.today { border-color: var(--gold); color: var(--gold); font-weight: 500; }
.cal-day.exam { background: #2a1010; border-color: #c0392b40; }
.cal-day.exam-dot::after {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #c0392b;
  position: absolute;
  bottom: 3px;
}
.cal-day.past { opacity: 0.4; }
.cal-day.haircut { background: #0a1a2a; border-color: #2980b940; }

.cal-day-num { font-size: 13px; line-height: 1; }
.cal-day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); margin-top: 2px; }

/* Day detail */
.day-detail {
  margin-top: 16px;
  animation: fadeUp 0.2s ease;
}

.day-detail-header {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--gold);
}

.day-event {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #1e1b17;
  align-items: center;
}

.day-event:last-child { border-bottom: none; }

.day-event-time { font-size: 10px; color: var(--muted); min-width: 40px; }
.day-event-name { font-size: 12px; flex: 1; }

.day-event-tag {
  font-size: 8px;
  letter-spacing: 0.1em;
  padding: 2px 6px;
  border-radius: 10px;
  font-weight: 500;
}

.tag-gym { background: #1a2a1a; color: #5dac6e; border: 1px solid #2a4a2a; }
.tag-skin { background: #1a1a2a; color: #7a9fd4; border: 1px solid #2a2a4a; }
.tag-food { background: #2a1a0a; color: #d4a05a; border: 1px solid #4a2a0a; }
.tag-supp { background: #1a2a2a; color: #5aaaa0; border: 1px solid #2a4a4a; }
.tag-rev { background: #2a2a1a; color: #c8c060; border: 1px solid #4a4a2a; }
.tag-exam { background: #2a1010; color: #e05050; border: 1px solid #4a2020; }
.tag-run { background: #1a2a1a; color: #70c870; border: 1px solid #2a4a2a; }
.tag-other { background: var(--dark4); color: var(--muted); border: 1px solid #3a3028; }

/* ── HABITS PAGE ── */
#page-habits { padding: 52px 20px 20px; }

.habit-section { margin-bottom: 24px; }

.habit-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid #1e1b17;
  cursor: pointer;
}

.habit-item:last-child { border-bottom: none; }

.habit-check {
  width: 24px; height: 24px;
  border: 1px solid #3a3028;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 13px;
}

.habit-item.done .habit-check {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--dark);
}

.habit-icon { font-size: 18px; flex-shrink: 0; }
.habit-name { flex: 1; font-size: 13px; }
.habit-streak { font-size: 10px; color: var(--gold); }

/* Water tracker */
.water-track {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.water-glass {
  width: 32px; height: 40px;
  border: 1px solid #2a2520;
  border-radius: 0 0 5px 5px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.water-glass.filled { border-color: #2980b9; }

.water-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0;
  background: linear-gradient(to top, #1a5a8a, #2980b9);
  transition: height 0.3s ease;
}

.water-glass.filled .water-fill { height: 100%; }
.water-label { margin-top: 8px; font-size: 11px; color: var(--muted); }
.water-label span { color: #4a9fc0; }

/* ── SUPPLEMENTS PAGE ── */
#page-supplements { padding: 52px 20px 20px; }

.supp-time { margin-bottom: 24px; }

.supp-time-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #2a2520;
}

.supp-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #1a1714;
  cursor: pointer;
}

.supp-item:last-child { border-bottom: none; }

.supp-check {
  width: 22px; height: 22px;
  border: 1px solid #3a3028;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 11px;
}

.supp-item.done .supp-check {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--dark);
}

.supp-icon { font-size: 20px; flex-shrink: 0; }
.supp-name { flex: 1; }
.supp-dose { font-size: 10px; color: var(--muted); margin-top: 1px; }
.supp-note { font-size: 10px; color: #5a9a80; margin-top: 2px; }

/* ── SHOP PAGE ── */
#page-shop { padding: 52px 20px 20px; }

.shop-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid #1e1b17;
  cursor: pointer;
}

.shop-item:last-child { border-bottom: none; }

.shop-check {
  width: 22px; height: 22px;
  border: 1px solid #3a3028;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 11px;
}

.shop-item.done .shop-check {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--dark);
}

.shop-item.done .shop-name { text-decoration: line-through; opacity: 0.5; }

.shop-name { flex: 1; }
.shop-tag {
  font-size: 8px;
  letter-spacing: 0.1em;
  padding: 2px 6px;
  border-radius: 10px;
}

/* ── NOTIFICATION BANNER ── */
.notif-banner {
  background: linear-gradient(135deg, #1a1508, #252010);
  border: 1px solid var(--gold);
  border-radius: 6px;
  padding: 14px 16px;
  margin: 0 20px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}

.notif-banner-icon { font-size: 28px; }
.notif-banner-text h3 { font-size: 14px; color: var(--gold); margin-bottom: 2px; }
.notif-banner-text p { font-size: 11px; color: var(--muted); }

/* ── STREAK ── */
.streak-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
}

.streak-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.streak-label { font-size: 11px; color: var(--muted); }

/* ── PILL ── */
.pill {
  display: inline-block;
  background: var(--dark4);
  border: 1px solid #3a3028;
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 10px;
  color: var(--muted);
  margin: 3px;
}

.pill.gold { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 500; }

/* ── MISC ── */
.divider { height: 1px; background: #2a2520; margin: 16px 0; }

.btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--gold);
  color: var(--dark);
  border: none;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  text-align: center;
  transition: opacity 0.2s;
}

.btn:active { opacity: 0.8; }
.btn.outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}

.empty-state .big { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="app">
  <div id="screen">

    <!-- TODAY -->
    <div id="page-today" class="page active">
      <div class="today-header">
        <div class="today-date" id="today-date-str"></div>
        <div class="today-title">Today's <span>Glow</span></div>
        <div class="days-left">⏳ <strong id="days-left-num">—</strong> days until 15 June</div>
        <div class="progress-ring-wrap">
          <div style="position:relative;width:72px;height:72px;">
            <svg class="progress-ring" width="72" height="72" viewBox="0 0 72 72">
              <circle class="ring-bg" cx="36" cy="36" r="30"/>
              <circle class="ring-fill" id="ring-fill" cx="36" cy="36" r="30" stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
            </svg>
            <div class="ring-text">
              <div class="ring-pct" id="ring-pct">0%</div>
              <div class="ring-sub">DONE</div>
            </div>
          </div>
        </div>
      </div>

      <div id="exam-banner-today"></div>
      <div id="notif-prompt"></div>
      <div class="timeline" id="timeline"></div>
    </div>

    <!-- CALENDAR -->
    <div id="page-calendar" class="page">
      <div class="eyebrow" style="margin-bottom:8px">SCHEDULE</div>
      <div class="cal-header">
        <div class="month-nav">
          <button class="month-btn" onclick="changeMonth(-1)">‹</button>
          <div class="month-name serif" id="month-name"></div>
          <button class="month-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-days-header">
          <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="day-detail" id="day-detail"></div>
    </div>

    <!-- HABITS -->
    <div id="page-habits" class="page">
      <div class="eyebrow" style="margin-bottom:8px">DAILY HABITS</div>
      <div class="section-title serif">Today's Checklist</div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-label">💧 Water</div>
        <div class="water-track" id="water-track"></div>
        <div class="water-label">Target: <span id="water-count">0</span>/8 glasses · <span id="water-ml">0</span>ml</div>
      </div>

      <div id="habits-list"></div>
    </div>

    <!-- SUPPLEMENTS -->
    <div id="page-supplements" class="page">
      <div class="eyebrow" style="margin-bottom:8px">SUPPLEMENTS</div>
      <div class="section-title serif">Daily Stack</div>
      <div id="supp-list"></div>
    </div>

    <!-- SHOP -->
    <div id="page-shop" class="page">
      <div class="eyebrow" style="margin-bottom:8px">SHOPPING</div>
      <div class="section-title serif">Buy List</div>
      <div class="card">
        <div class="card-label">🛒 One-time purchases</div>
        <div id="shop-list"></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="card-label">🥦 Weekly food</div>
        <div id="food-list"></div>
      </div>
    </div>

  </div>

  <!-- NAV -->
  <nav id="nav">
    <button class="nav-btn active" onclick="showPage('today',this)">
      <span class="nav-icon">☀️</span>TODAY
    </button>
    <button class="nav-btn" onclick="showPage('calendar',this)">
      <span class="nav-icon">📅</span>CAL
    </button>
    <button class="nav-btn" onclick="showPage('habits',this)">
      <span class="nav-icon">✅</span>HABITS
    </button>
    <button class="nav-btn" onclick="showPage('supplements',this)">
      <span class="nav-icon">💊</span>SUPPS
    </button>
    <button class="nav-btn" onclick="showPage('shop',this)">
      <span class="nav-icon">🛒</span>SHOP
    </button>
  </nav>
</div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════

const EXAM_DATES = {
  '2026-05-11': ['English Lit P1 (AM)', 'Business P1 (PM)'],
  '2026-05-14': ['Maths P1 Non-Calc (AM)'],
  '2026-05-15': ['History P1 (AM)'],
  '2026-05-18': ['Chemistry P1 (AM)'],
  '2026-05-19': ['English Lit P2 (AM)'],
  '2026-05-21': ['English Lang P1 (AM)', 'Business P2 (PM)'],
  '2026-06-02': ['Physics P1 (AM)'],
  '2026-06-03': ['Maths P2 Calc (AM)'],
  '2026-06-04': ['History P2 (AM)'],

function loadState() {
  try { return JSON.parse(localStorage.getItem('glowup-state') || '{}'); }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem('glowup-state', JSON.stringify(state));
}

let state = loadState();

function getDateKey(date) {
  return toDateStr(date || new Date());
}

function toggle(key, subkey) {
  if (!state[key]) state[key] = {};
  state[key][subkey] = !state[key][subkey];
  saveState(state);
}

function isChecked(key, subkey) {
  return !!(state[key] && state[key][subkey]);
}

// ══════════════════════════════════════════

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function daysUntil(dateStr) {
  const target = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((target - today) / 86400000);
}

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  // Group by morning/afternoon/evening
  const groups = [
    { label: 'MORNING', range: ['00:00', '12:00'] },
    { label: 'AFTERNOON', range: ['12:00', '18:00'] },
    { label: 'EVENING', range: ['18:00', '23:59'] },
  ];

  let html = '';
  const doneKeys = state[dateKey] || {};
  let total = 0, done = 0;

  for (const group of groups) {
    const groupItems = items.filter(i => {
      if (i.time === '—') return true;
      return i.time >= group.range[0] && i.time < group.range[1];
    });
    if (groupItems.length === 0) continue;

    html += `<div class="tl-group"><div class="tl-group-label">${group.label}</div>`;
    for (const item of groupItems) {
      const checked = doneKeys[item.id] || false;
      if (!item.isExam) { total++; if (checked) done++; }
      const doneClass = checked ? 'done' : '';
      const examClass = item.isExam ? 'exam' : '';
      html += `
        <div class="tl-item ${doneClass} ${examClass}" onclick="toggleTimeline('${dateKey}','${item.id}')">
          <div class="tl-dot"></div>
          <div class="tl-time">${item.time}</div>
          <div class="tl-content">
            <div class="tl-name">${item.icon} ${item.name}</div>
            ${item.sub ? `<div class="tl-sub">${item.sub}</div>` : ''}
          </div>
          ${!item.isExam ? `<div class="tl-check">${checked ? '✓' : ''}</div>` : ''}
        </div>`;
    }
    html += '</div>';
  }

  tl.innerHTML = html;

  // Update ring
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('ring-pct').textContent = pct + '%';
  const circ = 188.5;
  document.getElementById('ring-fill').style.strokeDashoffset = circ - (circ * pct / 100);
}

function toggleTimeline(dateKey, id) {
  if (!state[dateKey]) state[dateKey] = {};
  state[dateKey][id] = !state[dateKey][id];
  saveState(state);
  renderToday();
}

// ══════════════════════════════════════════
// RENDER: CALENDAR
// ══════════════════════════════════════════

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDay = null;

function renderCalendar() {
  document.getElementById('month-name').textContent = `${MONTHS[calMonth]} ${calYear}`;

  const grid = document.getElementById('cal-grid');
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  // Mon=0 offset
  const startDow = (firstDay.getDay() + 6) % 7;

  let html = '';
  for (let i = 0; i < startDow; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth, d);
    const dateStr = toDateStr(date);
    const isToday = date.getTime() === today.getTime();
    const isExam = !!EXAM_DATES[dateStr];
    const isPast = date < today;
    const isHaircut = dateStr === '2026-06-15';
    const isSelected = selectedDay === dateStr;

    let classes = 'cal-day';
    if (isToday) classes += ' today';
    if (isExam) classes += ' exam exam-dot';
    if (isPast && !isToday) classes += ' past';
    if (isHaircut) classes += ' haircut';
    if (isSelected) classes += ' today';

    html += `<div class="${classes}" onclick="selectDay('${dateStr}')">
      <div class="cal-day-num">${d}</div>
      ${isExam ? '' : '<div class="cal-day-dot" style="opacity:0"></div>'}
    </div>`;
  }

  grid.innerHTML = html;
  renderDayDetail();
}

function selectDay(dateStr) {
  selectedDay = selectedDay === dateStr ? null : dateStr;
  renderCalendar();
}

function renderDayDetail() {
  const detail = document.getElementById('day-detail');
  if (!selectedDay) { detail.innerHTML = ''; return; }

  const date = new Date(selectedDay + 'T12:00:00');
  const dayName = DAYS[date.getDay()];
  const formatted = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });
  const exams = EXAM_DATES[selectedDay];
  const items = getDaySchedule(date);

  let html = `<div class="day-detail-header">${dayName} ${formatted}</div>`;

  if (exams) {
    html += `<div class="exam-banner" style="margin:0 0 12px">
      <div class="exam-banner-icon">📝</div>
      <div><div class="exam-banner-title">Exam Day</div><div class="exam-banner-sub">${exams.join('<br>')}</div></div>
    </div>`;
  }

  const tagColors = { gym:'tag-gym', skin:'tag-skin', food:'tag-food', supp:'tag-supp', rev:'tag-rev', exam:'tag-exam', run:'tag-run', other:'tag-other' };

  for (const item of items) {
    html += `<div class="day-event">
      <div class="day-event-time">${item.time}</div>
      <div class="day-event-name">${item.icon} ${item.name}</div>
      <div class="day-event-tag ${tagColors[item.tag] || 'tag-other'}">${item.tag.toUpperCase()}</div>
    </div>`;
  }

  detail.innerHTML = html;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  selectedDay = null;
  renderCalendar();
}

// ══════════════════════════════════════════
// RENDER: HABITS
// ══════════════════════════════════════════

function renderHabits() {
  const dateKey = getDateKey();
  const waterKey = `water-${dateKey}`;
  const waterCount = state[waterKey] || 0;

  // Water
  let waterHtml = '';
  for (let i = 0; i < 8; i++) {
    const filled = i < waterCount;
    waterHtml += `<div class="water-glass ${filled ? 'filled' : ''}" onclick="toggleWater(${i})">
      <div class="water-fill"></div>
    </div>`;
  }
  document.getElementById('water-track').innerHTML = waterHtml;
  document.getElementById('water-count').textContent = waterCount;
  document.getElementById('water-ml').textContent = waterCount * 500;

  // Habits
  const sections = {
    morning: '🌅 Morning',
    gym: '🏋️ Training',
    evening: '🌙 Evening',
    other: '⭐ General',
  };

  let html = '';
  for (const [sectionKey, sectionLabel] of Object.entries(sections)) {
    const sItems = HABITS_DATA.filter(h => h.section === sectionKey);
    if (!sItems.length) continue;
    html += `<div class="habit-section"><div class="card">
      <div class="card-label">${sectionLabel}</div>`;
    for (const habit of sItems) {
      const checked = isChecked(`habit-${dateKey}`, habit.id);
      html += `<div class="habit-item ${checked ? 'done' : ''}" onclick="toggleHabit('${dateKey}','${habit.id}')">
        <div class="habit-check">${checked ? '✓' : ''}</div>
        <div class="habit-icon">${habit.icon}</div>
        <div class="habit-name">${habit.name}</div>
      </div>`;
    }
    html += '</div></div>';
  }
  document.getElementById('habits-list').innerHTML = html;
}

function toggleWater(idx) {
  const dateKey = getDateKey();
  const waterKey = `water-${dateKey}`;
  const cur = state[waterKey] || 0;
  state[waterKey] = idx < cur ? idx : idx + 1;
  saveState(state);
  renderHabits();
}

function toggleHabit(dateKey, id) {
  toggle(`habit-${dateKey}`, id);
  renderHabits();
}

// ══════════════════════════════════════════
// RENDER: SUPPLEMENTS
// ══════════════════════════════════════════

function renderSupplements() {
  const dateKey = getDateKey();
  const sections = [
    { key: 'morning', label: '☀️ Morning — with breakfast', items: SUPPLEMENTS.morning },
    { key: 'afterBreakfast', label: '💊 After breakfast', items: SUPPLEMENTS.afterBreakfast },
    { key: 'postWorkout', label: '🏋️ Post workout', items: SUPPLEMENTS.postWorkout },
    { key: 'evening', label: '🌙 Evening', items: SUPPLEMENTS.evening },
  ];

  let html = '';
  for (const section of sections) {
    html += `<div class="supp-time card" style="margin-bottom:12px">
      <div class="supp-time-label">${section.label}</div>`;
    for (const supp of section.items) {
      const id = `${section.key}-${supp.name.replace(/\s/g,'-')}`;
      const checked = isChecked(`supp-${dateKey}`, id);
      html += `<div class="supp-item ${checked ? 'done' : ''}" onclick="toggleSupp('${dateKey}','${id}')">
        <div class="supp-check">${checked ? '✓' : ''}</div>
        <div class="supp-icon">${supp.icon}</div>
        <div class="flex-1">
          <div class="supp-name">${supp.name}</div>
          <div class="supp-dose">${supp.dose}</div>
          ${supp.note ? `<div class="supp-note">${supp.note}</div>` : ''}
        </div>
      </div>`;
    }
    html += '</div>';
  }
  document.getElementById('supp-list').innerHTML = html;
}

function toggleSupp(dateKey, id) {
  toggle(`supp-${dateKey}`, id);
  renderSupplements();
}

// ══════════════════════════════════════════
// RENDER: SHOP
// ══════════════════════════════════════════

function renderShop() {
  const tagMap = { skin: 'SKIN', supp: 'SUPPS', food: 'FOOD' };
  const tagStyle = { skin: 'tag-skin', supp: 'tag-supp', food: 'tag-gym' };

  function renderList(items, containerId) {
    let html = '';
    for (const item of items) {
      const checked = isChecked('shop', item.id);
      html += `<div class="shop-item ${checked ? 'done' : ''}" onclick="toggleShop('${item.id}')">
        <div class="shop-check">${checked ? '✓' : ''}</div>
        <div class="flex-1">
          <div class="shop-name">${item.name}</div>
          ${item.note ? `<div style="font-size:10px;color:var(--muted)">${item.note}</div>` : ''}
        </div>
        <div class="day-event-tag ${tagStyle[item.tag] || 'tag-other'}">${tagMap[item.tag] || item.tag.toUpperCase()}</div>
      </div>`;
    }
    document.getElementById(containerId).innerHTML = html;
  }

  renderList(SHOP_ITEMS, 'shop-list');
  renderList(FOOD_ITEMS, 'food-list');
}

function toggleShop(id) {
  toggle('shop', id);
  renderShop();
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  btn.classList.add('active');
  document.getElementById('screen').scrollTop = 0;

  if (name === 'today') renderToday();
  if (name === 'calendar') renderCalendar();
  if (name === 'habits') renderHabits();
  if (name === 'supplements') renderSupplements();
  if (name === 'shop') renderShop();
}

async function enableNotifs() {
  const granted = await requestNotifications();
  if (granted) {
    await setupNotifications();
    document.getElementById('notif-prompt').innerHTML = '';
    // Show success
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#0a1a0a;border:1px solid #27ae6040;border-radius:6px;padding:14px 16px;margin:0 20px 16px;font-size:12px;color:#5dac6e;';
    banner.textContent = '✅ Notifications enabled! You\'ll get reminders for every step.';
    document.getElementById('exam-banner-today').after(banner);
    setTimeout(() => banner.remove(), 4000);
  }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

async function init() {
  // Register service worker
  if ('serviceWorker' in navigator) {
    try {
      await navigator.serviceWorker.register('./sw.js', { scope: '/glowup/' });
      console.log('SW registered');
      if (Notification.permission === 'granted') {
        setTimeout(setupNotifications, 1000);
      }
    } catch(e) { console.log('SW failed:', e); }
  }

  renderToday();
  renderCalendar();
}

init();
</script>
